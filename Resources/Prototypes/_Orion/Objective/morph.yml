- type: entity
  parent: BaseObjective
  id: BaseMorphObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: objective-issuer-unknown
    icon:
      sprite: _Orion/Mobs/Aliens/morph.rsi
      state: alive
  - type: RoleRequirement
    roles:
    - MorphRole

- type: entity
  parent: [ BaseMorphObjective, BaseSurviveObjective ]
  id: MorphSurviveObjective
  name: Survive until the end of the round.

- type: entity
  parent: BaseMorphObjective
  id: MorphDevourLivingObjective
  name: Devour living creatures.
  components:
  - type: Objective
    difficulty: 2
  - type: MorphDevourLivingCondition
    target: 3

- type: entity
  parent: BaseMorphObjective
  id: MorphReproduceObjective
  name: Reproduce.
  components:
  - type: Objective
    difficulty: 1
  - type: MorphReproduceCondition
    target: 2
