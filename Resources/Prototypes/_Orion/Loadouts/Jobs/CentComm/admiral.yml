- type: job
  id: CentralCommandAdmiral
  name: job-name-admiral
  description: job-description-admiral
  playTimeTracker: JobCentralCommandAdmiral
  setPreference: false
  startingGear: CentcomAdmiralGear
  icon: "JobIconNanotrasen"
  supervisors: job-supervisors-centcom
  canBeAntag: false
  requirements:
  - !type:AgeRequirement
    requiredAge: 21
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  - NanotrasenRepresentative
  - BlueshieldOfficer
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, FreedomImplant, BluespaceLifelineImplant, RadioImplantCentcomm, StypticStimulatorImplant, DeathRattleImplantCentcomm ]
  - !type:AddComponentSpecial
    components:
      - type: AdditionalLanguage
        speaks:
        - CorporateCodespeak
        understands:
        - CorporateCodespeak

