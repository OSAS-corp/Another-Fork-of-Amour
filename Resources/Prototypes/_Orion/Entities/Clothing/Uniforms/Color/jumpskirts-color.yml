# Base (White)
- type: entity
  parent: ClothingUniformSkirtBase
  id: ClothingUniformJumpskirtTurtleneckWhite
  name: white turtleneck with skirt
  description: Warm and comfy.
  components:
  - type: Sprite
    sprite: _Orion/Clothing/Uniforms/Jumpskirt/turtleneck_women.rsi
    layers:
    - state: icon-color
      color: "#e5e8f0"
    - state: icon
  - type: Item
    sprite: _Orion/Clothing/Uniforms/Jumpskirt/turtleneck_women.rsi
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#e5e8f0"
      - state: details-inhand-left
      right:
      - state: inhand-right
        color: "#e5e8f0"
      - state: details-inhand-right
  - type: Clothing
    sprite: _Orion/Clothing/Uniforms/Jumpskirt/turtleneck_women.rsi
    clothingVisuals:
      jumpsuit:
      - state: color-equipped-INNERCLOTHING
        color: "#e5e8f0"
      - state: equipped-INNERCLOTHING

