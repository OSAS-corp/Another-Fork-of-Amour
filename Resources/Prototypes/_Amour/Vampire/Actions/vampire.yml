#Base abilities

- type: entity
  parent: BaseAction
  id: ActionVampireToggleFangs
  name: Toggle fangs
  description: Extend or retract your fangs.
  components:
    - type: Action
      useDelay: 2 # Toggle
      itemIconStyle: NoItem
      priority: 1
      icon:
        sprite: _Amour/Vampire/actions_vampire.rsi
        state: fangs_retracted
      iconOn:
        sprite: _Amour/Vampire/actions_vampire.rsi
        state: fangs_extended
    - type: InstantAction
      event: !type:VampireToggleFangsActionEvent {}
    - type: VampireAction
      bloodToUnlock: 0
      bloodCost: 0

- type: entity
  parent: BaseAction
  id: ActionVampireGlare
