- type: entity
  parent: RubberStampBase
  id: GeraldiyRubberStamp
  name: печать древних
  description: Старая и потёртая печать с логотипом "Древние". На ней почти высохли чернила, но она все ещё может послужить убедительным аргументом в руках нужных людей.
  suffix: fluff
  components:
    - type: Stamp
      stampedName: stamp-component-stamped-name-geraldiy
      stampState: "paper_stamp-geraldiy"
      stampedColor: "#a23e3e"
    - type: Sprite
      sprite: _Amour/Fluff/Geraldiy/stamp.rsi
      state: stamp-geraldiy

- type: entity
  parent: BaseItem
  id: GeraldiyAncientBlade
  name: клинок древних
  description: Большой клинок, заменяющий руку. Состоит из материала, похожего на пласталь. Клинок покрыт экзотическими частицами, непонятными человеческому разуму. Кто в здравом уме пойдет против обладателя этого клинка?..
  suffix: fluff
  components:
    - type: Sprite
      sprite: _Amour/Fluff/Geraldiy/blade.rsi
      state: icon
    - type: Item
      sprite: _Amour/Fluff/Geraldiy/blade.rsi
    - type: MeleeWeapon
      wideAnimationRotation: -135
      damage:
        types:
          Slash: 14
      soundHit:
        path: /Audio/Weapons/bladeslice.ogg
    - type: Unremoveable
      deleteOnDrop: true
    - type: Sharp
    - type: DisarmMalus

